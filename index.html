          <div style={{background:`linear-gradient(90deg,${curRank.glow},${curRank.color})`,height:6,borderRadius:6,width:`${rankPct*100}%`,transition:"width .4s",boxShadow:`0 0 6px ${curRank.glow}`}}/>
        </div>
        <div style={{fontSize:9,color:"#444"}}>{nextRank?`${curRank.max-rankPoints} RP to ${nextRank.label}`:"⚡ MAX RANK — PRO"}</div>
      </div>}
      <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center",width:"100%",maxWidth:820}}>
        <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,165,0,.2)",borderRadius:14,padding:"18px 20px",flex:"1 1 200px",minWidth:200}}>
          <div style={{fontSize:11,color:"#888",marginBottom:10,fontWeight:700,letterSpacing:2}}>ROOM</div>
          {!roomCode ? (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={handleCreate} style={{background:"rgba(255,165,0,.12)",border:"1px solid #FFA500",color:"#FFA500",borderRadius:8,padding:10,cursor:"pointer",fontFamily:"monospace",fontWeight:700}}>+ Create Room</button>
              <div style={{display:"flex",gap:6}}>
                <input value={roomInput} onChange={e=>setRoomInput(e.target.value.toUpperCase())} placeholder="Enter code..." maxLength={6} style={{flex:1,background:"rgba(255,255,255,.07)",border:"1px solid #444",borderRadius:8,padding:8,color:"#fff",fontFamily:"monospace",fontSize:13,outline:"none"}}/>
                <button onClick={handleJoin} style={{background:"rgba(100,200,100,.12)",border:"1px solid #66BB6A",color:"#66BB6A",borderRadius:8,padding:"8px 10px",cursor:"pointer",fontFamily:"monospace",fontWeight:700}}>Go</button>
              </div>
              {error&&<div style={{color:"#FF4444",fontSize:11}}>{error}</div>}
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:"#666",letterSpacing:2,marginBottom:4}}>{isHost?"YOUR ROOM CODE — SHARE WITH FRIENDS":"JOINED ROOM"}</div>
                <div style={{fontSize:28,fontWeight:900,color:"#FFD700",letterSpacing:6,textShadow:"0 0 20px #FFD70066"}}>{roomCode}</div>
                {isHost&&<div style={{fontSize:10,color:"#555",marginTop:2}}>Tap to copy</div>}
              </div>
              <div style={{fontSize:11,color:"#555",textAlign:"center"}}>
                {roomPlayers.length} player{roomPlayers.length!==1?"s":""} in room
              </div>
              <button onClick={handleLeaveRoom} style={{background:"rgba(255,100,50,.08)",border:"1px solid rgba(255,100,50,.3)",color:"#FF8866",borderRadius:8,padding:"6px 10px",fontSize:11,cursor:"pointer",fontFamily:"monospace"}}>⬅ Leave Room</button>
            </div>
          )}
        </div>
        <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,165,0,.2)",borderRadius:14,padding:"18px 20px",flex:"1 1 180px",minWidth:180}}>
          <div style={{fontSize:11,color:"#888",marginBottom:10,fontWeight:700,letterSpacing:2}}>GAME MODE</div>
          {GAME_MODES.map(m=><button key={m.id} onClick={async()=>{
            if(roomCode&&!isHost) return; // joiner can't change mode
            setGameMode(m.id); buildLobby(m.id);
            if(roomCode&&isHost){
              // Update room in Supabase so joiner sees correct mode
              try{ await sbFetch(`rooms?code=eq.${roomCode}`,{method:"PATCH",body:JSON.stringify({game_mode:m.id}),prefer:"return=minimal"}); }catch(e){}
            }
          }} style={{display:"block",width:"100%",marginBottom:6,background:gameMode===m.id?"rgba(255,165,0,.18)":"transparent",border:`1px solid ${gameMode===m.id?"#FFA500":"#333"}`,color:gameMode===m.id?"#FFA500":"#777",borderRadius:8,padding:"7px 10px",cursor:"pointer",fontFamily:"monospace",fontSize:13,textAlign:"left"}}>{m.icon} {m.label} <span style={{opacity:.4,fontSize:11}}>({m.teamSize}p)</span></button>)}
        </div>
        <div style={{background:"rgba(255,255,255,.04)",border:`1px solid ${RARITY[selectedKernel.rarity].color}44`,borderRadius:14,padding:"14px 18px",flex:"0 0 auto",minWidth:160,textAlign:"center",cursor:"pointer"}}
          onClick={()=>setShowCollection(true)}>
          <div style={{fontSize:9,color:"#666",letterSpacing:2,marginBottom:6}}>EQUIPPED KERNEL</div>
          <div style={{fontSize:40,filter:`drop-shadow(0 0 10px ${RARITY[selectedKernel.rarity].glow})`}}>{selectedKernel.emoji}</div>
          <div style={{fontSize:12,color:RARITY[selectedKernel.rarity].color,marginTop:4,fontWeight:700}}>{selectedKernel.name}</div>
          <div style={{fontSize:9,color:"#555",marginTop:2}}>{RARITY[selectedKernel.rarity].label}</div>
          <div style={{fontSize:9,color:"#FFA500",marginTop:6,border:"1px solid rgba(255,165,0,.2)",borderRadius:6,padding:"2px 8px",display:"inline-block"}}>📚 Change in Collection</div>
        </div>
      </div>

      {/* Room players list */}
      {roomCode&&roomPlayers.length>0&&(
        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,165,0,.15)",borderRadius:12,padding:"14px 20px",marginTop:16,minWidth:240}}>
          <div style={{fontSize:11,color:"#888",marginBottom:8,fontWeight:700,letterSpacing:2}}>PLAYERS IN ROOM ({roomPlayers.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {roomPlayers.map((p,i)=>(
              <div key={i} style={{display:"flex",gap:8,alignItems:"center",fontSize:13}}>
                <span>👤</span>
                <span style={{color:p===username.toLowerCase()?"#fff":"#aaa"}}>{p}</span>
                {p===username.toLowerCase()&&<span style={{fontSize:10,color:"#FFD700",background:"rgba(255,215,0,.1)",borderRadius:4,padding:"1px 6px"}}>YOU</span>}
                {i===0&&<span style={{fontSize:10,color:"#FFA500",background:"rgba(255,165,0,.1)",borderRadius:4,padding:"1px 6px"}}>HOST</span>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Team bots (only when no room) */}
      {!roomCode&&lobbyBots.length>0&&<div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,165,0,.15)",borderRadius:12,padding:"14px 20px",marginTop:16,minWidth:240}}>
        <div style={{fontSize:11,color:"#888",marginBottom:8,fontWeight:700,letterSpacing:2}}>YOUR TEAM</div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          <div style={{display:"flex",gap:8,alignItems:"center",fontSize:13}}><span>👤</span><span style={{color:"#fff"}}>{username}</span><span style={{fontSize:10,color:"#FFD700",background:"rgba(255,215,0,.1)",borderRadius:4,padding:"1px 6px"}}>YOU</span></div>
          {lobbyBots.map((b,i)=><div key={i} style={{display:"flex",gap:8,alignItems:"center",fontSize:13}}><span>{b.k.emoji}</span><span style={{color:"#555"}}>{b.name}</span></div>)}
        </div>
      </div>}

      {countdown!==null
        ?<div style={{fontSize:80,fontWeight:900,color:"#FFD700",textShadow:"0 0 40px #FFD700",marginTop:20}}>{countdown||"🍿"}</div>
        : roomCode
          ? isHost
            ? <button onClick={handleStartGame} style={{marginTop:20,background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#1a0000",border:"none",borderRadius:14,padding:"15px 48px",fontSize:17,fontWeight:900,cursor:"pointer",fontFamily:"monospace",letterSpacing:2}}>🍿 START GAME!</button>
            : <div style={{marginTop:20,background:"rgba(255,255,255,.04)",border:"1px solid #333",borderRadius:14,padding:"15px 48px",fontSize:14,color:"#555",fontFamily:"monospace",letterSpacing:1,textAlign:"center"}}>⏳ Waiting for host to start...</div>
          : <button onClick={()=>setCountdown(3)} style={{marginTop:20,background:"rgba(255,165,0,.15)",color:"#FFA500",border:"1px solid #FFA500",borderRadius:14,padding:"15px 48px",fontSize:17,fontWeight:900,cursor:"pointer",fontFamily:"monospace",letterSpacing:2}}>🎮 Solo Quick Play</button>
      }
      {showCollection&&<CollectionScreen unlockedKernels={unlockedKernels} selectedKernel={selectedKernel} onSelect={k=>{setSelectedKernel(k);}} onClose={()=>setShowCollection(false)}/>}
      {showStats&&<StatsScreen stats={stats} xp={xp} rankPoints={rankPoints} winStreak={winStreak} onClose={()=>setShowStats(false)}/>}
      {showAchievements&&<AchievementsScreen earned={achievements} stats={stats} rankPoints={rankPoints} onClose={()=>setShowAchievements(false)}/>}
      {showTutorial&&<TutorialOverlay onClose={()=>setShowTutorial(false)}/>}
      {showTrophyRoad&&<TrophyRoadScreen trophies={trophies} unlockedGlows={unlockedGlows} unlockedKernels={unlockedKernels} selectedGlow={selectedGlow} onSelectGlow={g=>{setSelectedGlow(g);}} onClose={()=>setShowTrophyRoad(false)}/>}
      {newTrophyRewards.length>0&&<div style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",background:"rgba(10,8,0,.97)",border:"2px solid #FFD700",borderRadius:16,padding:"18px 28px",zIndex:9999,textAlign:"center",minWidth:260,boxShadow:"0 0 30px #FFD70066"}}>
        <div style={{fontSize:22,marginBottom:6}}>🏆 Trophy Road Unlock!</div>
        {newTrophyRewards.map((r,i)=><div key={i} style={{fontSize:13,color:"#FFD700",fontFamily:"monospace",marginBottom:4}}>{r.label}</div>)}
        <button onClick={()=>setNewTrophyRewards([])} style={{marginTop:10,background:"rgba(255,215,0,.15)",border:"1px solid #FFD700",color:"#FFD700",borderRadius:8,padding:"6px 20px",fontSize:12,cursor:"pointer",fontFamily:"monospace"}}>🎉 Awesome!</button>
      </div>}
      {newAchievements.length>0&&<AchievementToast achievements={newAchievements} onDone={()=>setNewAchievements([])}/>}
      {adminGifts.length>0&&<AdminGiftChest skins={adminGifts} onClose={()=>setAdminGifts([])}/>}
      {adminBroadcast&&<AdminBroadcast
        broadcast={adminBroadcast}
        pollVoted={pollVoted}
        onClose={()=>{
          if(adminBroadcast?.createdAt) localStorage.setItem(`popcorn_broadcast_seen_${adminBroadcast.createdAt}`,"1");
          setAdminBroadcast(null);
        }}
        onVote={async(vote)=>{
          setPollVoted(vote);
          if(adminBroadcast?.createdAt) localStorage.setItem(`popcorn_broadcast_seen_${adminBroadcast.createdAt}`,"1");
          try{
            const rows=await sbFetch("broadcast?id=eq.1&limit=1");
            if(rows?.length){
              const r=rows[0];
              const update=vote==="yes"?{votes_yes:(r.votes_yes||0)+1}:{votes_no:(r.votes_no||0)+1};
              await sbFetch("broadcast?id=eq.1",{method:"PATCH",body:JSON.stringify(update),prefer:"return=minimal"});
              setAdminBroadcast(prev=>prev?{...prev,...update,votes_yes:vote==="yes"?(r.votes_yes||0)+1:r.votes_yes||0,votes_no:vote==="no"?(r.votes_no||0)+1:r.votes_no||0}:null);
            }
          }catch(e){}
        }}
      />}
    </div>
  </> );}  

  if(screen==="ability") return(
    <div style={{...S,minHeight:"100vh",background:"radial-gradient(ellipse,#0d0033,#0d0500)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{fontSize:22,fontWeight:900,color:"#FFD700",marginBottom:4}}>Choose Your Ability</div>
      <div style={{color:"#555",fontSize:12,marginBottom:28,letterSpacing:1}}>DODGE the boss! Move around the frying pan to survive.</div>
      <div style={{display:"flex",gap:8,marginBottom:22,flexWrap:"wrap",justifyContent:"center"}}>
        {BOSSES.map((b,i)=><div key={b.id} style={{textAlign:"center",padding:"8px 12px",background:"rgba(255,255,255,.04)",borderRadius:10,border:`1px solid ${b.color}44`}}>
          <div style={{fontSize:28}}>{b.icon}</div>
          <div style={{fontSize:9,color:b.color,marginTop:4}}>Boss {i+1}</div>
          <div style={{fontSize:8,color:"#555"}}>4 phases</div>
        </div>)}
      </div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center",marginBottom:36}}>
        {ABILITIES.map(a=><div key={a.id} onClick={()=>setSelectedAbility(a.id)} style={{background:selectedAbility===a.id?"rgba(255,255,255,.1)":"rgba(255,255,255,.03)",border:`2px solid ${selectedAbility===a.id?a.color:"#333"}`,borderRadius:18,padding:"22px 26px",cursor:"pointer",textAlign:"center",minWidth:140,boxShadow:selectedAbility===a.id?`0 0 24px ${a.color}55`:"none",transition:"all .2s"}}>
          <div style={{fontSize:40,marginBottom:10}}>{a.icon}</div>
          <div style={{fontSize:15,fontWeight:700,color:selectedAbility===a.id?a.color:"#ddd"}}>{a.name}</div>
          <div style={{fontSize:11,color:"#666",marginTop:6}}>{a.desc}</div>
        </div>)}
      </div>
      <button onClick={()=>setScreen("game")} style={{background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#1a0000",border:"none",borderRadius:14,padding:"14px 48px",fontSize:16,fontWeight:900,cursor:"pointer",fontFamily:"monospace",letterSpacing:2}}>🍿 ENTER THE PAN</button>
    </div>
  );

  if(screen==="game") return(
    <div style={{...S,minHeight:"100vh",background:"#080400",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:8}}>
      <GameCanvas key={gameKey} playerKernel={selectedKernel} ability={selectedAbility} gameMode={roomCode ? roomGameModeRef.current : gameMode} isRanked={playMode==="ranked"} botMult={playMode==="ranked"?getRank(rankPoints).botMult:1.0} onGameEnd={handleGameEnd} seed={roomCode ? roomSeed : 0} roomTeammates={roomCode ? roomTeammatesRef.current : []} rankGlow={selectedGlow ? TROPHY_ROAD.find(m=>m.glowId===selectedGlow)?.glowColor : getRank(rankPoints).glow}/>
    </div>
  );

  if(screen==="chest") return <ChestScreen unlockedKernels={unlockedKernels} placement={placement} isRanked={playMode==="ranked"} rpChange={rpChange} xpGained={xpGained} dailyBonus={dailyBonus} trophiesEarned={playMode!=="ranked"?calcTrophies(placement):0} onClaim={handleClaim}/>;

  if(screen==="gameOver"){ handleClaim(rollChest()); return null; } // shouldn't reach here anymore

  return null;
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(PopcornBattle));
  </script>
</body>
</html>
