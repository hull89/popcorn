function getRank(rp){ return RANKS.slice().reverse().find(r=>rp>=r.min)||RANKS[0]; }

function calcRpChange(placement, total=60){
  // win big → gain lots, lose early → lose a little
  if(placement===1)  return +80;
  if(placement<=3)   return +50;
  if(placement<=10)  return +25;
  if(placement<=20)  return +10;
  if(placement<=40)  return -10;
  return -20;
}

function rollChestRanked(placement=60){
  // Ranked gives slightly better odds
  const p = placement;
  let chances;
  if(p===1){
    chances={ultra:.00005,legendary:.22,mythic:.17,epic:.22,super_rare:.20,rare:.18995};
  } else if(p<=5){
    chances={ultra:.00003,legendary:.14,mythic:.12,epic:.20,super_rare:.26,rare:.27997};
  } else if(p<=10){
    chances={ultra:.00002,legendary:.08,mythic:.09,epic:.16,super_rare:.30,rare:.36998};
  } else if(p<=20){
    chances={ultra:.00001,legendary:.04,mythic:.06,epic:.12,super_rare:.28,rare:.49999};
  } else if(p<=40){
    chances={ultra:.00001,legendary:.02,mythic:.03,epic:.08,super_rare:.22,rare:.64999};
  } else {
    chances={ultra:.00001,legendary:.01,mythic:.015,epic:.04,super_rare:.18,rare:.75499};
  }
  const total=Object.values(chances).reduce((s,v)=>s+v,0);
  let r=Math.random()*total, cum=0;
  for(const [k,v] of Object.entries(chances)){
    cum+=v; if(r<cum){
      const pool=KERNELS.filter(x=>x.rarity===k&&x.rarity!=="admin_exclusive");
      return pool.length ? rndOf(pool) : KERNELS[0];
    }
  }
  return KERNELS[0];
}

// ── XP / LEVELS ───────────────────────────────────────────────
function xpForGame(placement){
  if(placement===1)  return 120;
  if(placement<=3)   return 80;
  if(placement<=10)  return 50;
  if(placement<=20)  return 30;
  if(placement<=40)  return 15;
  return 8;
}
function xpToNextLevel(lvl){ return 100 + lvl * 40; }
function calcLevel(totalXp){
  let lvl=1, xp=totalXp;
  while(xp>=xpToNextLevel(lvl)){ xp-=xpToNextLevel(lvl); lvl++; }
  return lvl;
}
function calcLevelProgress(totalXp){
  let lvl=1, xp=totalXp;
  while(xp>=xpToNextLevel(lvl)){ xp-=xpToNextLevel(lvl); lvl++; }
  return {lvl, xpInLevel:xp, xpNeeded:xpToNextLevel(lvl)};
}

// rollChest: placement = finishing position (1=winner, 60=first out)
// Bad placement = mostly Rare junk. Good placement = real shot at Legendary.
//
//  Placement  Legendary  Mythic  Epic  SuperRare  Rare
//  #1 winner    18%       14%    20%     22%       26%
//  Top 5        10%        9%    18%     28%       35%
//  Top 10        5%        6%    14%     30%       45%
//  Top 20        2%        4%    10%     28%       56%
//  Top 40        1%        2%     6%     21%       70%
//  Bottom 20   0.5%        1%     3%     15%     80.5%  ← mostly trash
function rollChest(placement=60){
  const p = placement;
  let chances;
  if(p===1){
    chances={ultra:.00001,legendary:.18,mythic:.14,epic:.20,super_rare:.22,rare:.25999};
  } else if(p<=5){
    chances={ultra:.00001,legendary:.10,mythic:.09,epic:.18,super_rare:.28,rare:.34999};
  } else if(p<=10){
    chances={ultra:.00001,legendary:.05,mythic:.06,epic:.14,super_rare:.30,rare:.44999};
  } else if(p<=20){
    chances={ultra:.00001,legendary:.02,mythic:.04,epic:.10,super_rare:.28,rare:.55999};
  } else if(p<=40){
    chances={ultra:.00001,legendary:.01,mythic:.02,epic:.06,super_rare:.21,rare:.69999};
  } else {
    chances={ultra:.00001,legendary:.005,mythic:.01,epic:.03,super_rare:.155,rare:.79999};
  }
  const total=Object.values(chances).reduce((s,v)=>s+v,0);
  let r=Math.random()*total, cum=0;
  for(const [k,v] of Object.entries(chances)){
    cum+=v; if(r<cum){
      const pool=KERNELS.filter(x=>x.rarity===k&&x.rarity!=="admin_exclusive");
      return pool.length ? rndOf(pool) : KERNELS[0];
    }
  }
  return KERNELS[0];
}

function getOddsForPlacement(p){
  if(p===1)      return {ultra:"0.001",legendary:18,  mythic:14,epic:20,super_rare:22,  rare:26};
  if(p<=5)       return {ultra:"0.001",legendary:10,  mythic:9, epic:18,super_rare:28,  rare:35};
  if(p<=10)      return {ultra:"0.001",legendary:5,   mythic:6, epic:14,super_rare:30,  rare:45};
  if(p<=20)      return {ultra:"0.001",legendary:2,   mythic:4, epic:10,super_rare:28,  rare:56};
  if(p<=40)      return {ultra:"0.001",legendary:1,   mythic:2, epic:6, super_rare:21,  rare:70};
  return              {ultra:"0.001",legendary:0.5, mythic:1, epic:3, super_rare:15.5,rare:80};
}

// ─── WORLD ────────────────────────────────────────────────────
const PAN_R  = 640;          // pan cooking surface radius (world units)
const CX = 800, CY = 800;    // world center = boss position
const ZOOM   = 2.4;          // zoomed out — 4 corners of view show area around player
const LERP   = 0.08;         // camera smoothness

function clampPan(e){
  const m=e.r+3, dx=e.x-CX, dy=e.y-CY, dist=Math.sqrt(dx*dx+dy*dy), lim=PAN_R-m;
  if(dist>lim){const f=lim/dist; e.x=CX+dx*f; e.y=CY+dy*f;}
}

// ─── GAME ─────────────────────────────────────────────────────
function GameCanvas({playerKernel, ability, gameMode, isRanked, botMult, onGameEnd, seed, roomTeammates=[], rankGlow}){
  // Seeded RNG — same seed = same bots, same spawns, same boss order
  // Uses mulberry32 algorithm
  const rngRef = useRef(null);
  function makeRng(s){
    let state = s || Math.floor(Math.random()*999999);
    return function(){
      state |= 0; state = state + 0x6D2B79F5 | 0;
      let t = Math.imul(state ^ state >>> 15, 1 | state);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  // Initialize RNG once per game
  if(!rngRef.current) rngRef.current = makeRng(seed||0);
  const rng = rngRef.current;
  const canvasRef = useRef(null);
  const keysRef   = useRef({});
  const touchRef  = useRef({joyX:0, joyY:0, abil:false});
  const joyRef    = useRef({active:false, sx:0, sy:0});
  const animRef   = useRef(null);
  const camRef    = useRef(null);  // initialised after spawn inside useEffect

  useEffect(()=>{
    const canvas = canvasRef.current;
    const ctx    = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;

    // ── game state
    const TOTAL = isRanked ? 100 : 75;
    let frame = 0, gameOver = false, won = false;
    let survivors = TOTAL;
    let bossIdx = 0, phaseIdx = 0;
    let phaseMs = 0;                    // elapsed ms in current phase
    let bossDefeated = [false,false,false,false];
    let betweenBosses = false;          // short pause between bosses
    let betweenTimer = 0;
    let killFeed = [];
    let abilCD = 0;
    const ABIL_MAX = 220;

    // ── per-wave timers: [{elapsed, waveIndex, waveList}]
    // We run ALL waves in a phase simultaneously, each with its own countdown
    let waveTimers = [];   // [{idx, cd}]
    let spiralAngle = 0;
    let rainCol = 0;

    function initPhase(){
      const waves = BOSSES[bossIdx].phases[phaseIdx];
      waveTimers = waves.map((w,i)=>({i, cd: i*400})); // stagger start slightly
      spiralAngle = 0; rainCol = 0;
      phaseMs = 0;
    }
    initPhase();

    // ── spawn helpers
    function spawnInPan(margin=55){
      for(let t=0;t<400;t++){
        const a=rng()*Math.PI*2, r=margin+rng()*(PAN_R-margin-40);
        const x=CX+Math.cos(a)*r, y=CY+Math.sin(a)*r;
        if((x-CX)**2+(y-CY)**2<(PAN_R-40)**2) return {x,y};
      }
      return {x:CX+200, y:CY};
    }

    // ── team mode?
    const isTeamMode = gameMode !== "solo";

    // ── player
    const {x:px,y:py} = spawnInPan(80);

    // Camera starts exactly at player so the 4 corners of the canvas show the world around them
    if(!camRef.current) camRef.current = {x:px, y:py};
    else { camRef.current.x = px; camRef.current.y = py; }
    const cam = camRef.current;

    const player = {
      x:px, y:py, r:12, hp:2, maxHp:2,
      speed:2.4, angle:0,
      shieldOn:false, shieldT:0,
      healOn:false,   healT:0,
      catchOn:false,  catchT:0,
      alive:true, invT:0,
      downed:false, downTimer:0,
      reviveT:0,
      color:playerKernel.color, accent:playerKernel.accent, emoji:playerKernel.emoji,
    };

    // Seeded bot name/kernel helpers
    function rndKernelSeeded(){const ks=KERNELS.filter(k=>k.rarity!=="admin_exclusive"&&k.rarity!=="ultra");return ks[Math.floor(rng()*ks.length)];}
    function rndBotNameSeeded(){const names=["PopRocket","KernelKing","ButterBandit","GoldenPop","SaltShaker","VoidMaster","CrunchBot","FlameKernel","SnackAttack","OilSlick","HeatSeeker","ZapKernel","FizzPop","BlazeBot","SizzleBot","ToastBot","SparkBot","CrispBot","VaporBot","NukeKernel","PopStorm","KernFury","ButterFly","SaltNuke","GhostPop","ChaosKernel","IronCorn","PopNinja","KernelRage","BurnBot","FrostKern","PopHunter","ShadowKern","ToxicPop","StormCorn","LavaBot","CrystalPop","VoidKernel","DragonPop","AngelKern","GalaxyBot","RainbowPop","MidnightKern","SpicyBot","IceKernel","CyberPop","NeonKern","PhantomPop","ThunderKern","InfernoBot"];return names[Math.floor(rng()*names.length)]+Math.floor(rng()*999);}

    // ── bots – they wander and try to dodge nearby projectiles
    const teamSize = GAME_MODES.find(m=>m.id===gameMode)?.teamSize||1;
    const bots = Array.from({length:TOTAL-1},(_,i)=>{
      // Replace first teammate slots with real room players
      const isRealTeammate = i < teamSize-1 && i < roomTeammates.length;
      const realTm = isRealTeammate ? roomTeammates[i] : null;
      const k = realTm ? realTm.kernel : rndKernelSeeded();
      const {x,y}=spawnInPan(60);
      const mult = botMult||1.0;
      return {
        id:i, x, y, r:10, hp:2, maxHp:2, alive:true, invT:0,
        color:k.color, accent:k.accent, emoji:k.emoji,
        name: realTm ? realTm.username : rndBotNameSeeded(),
        isRealPlayer: !!realTm, // marks this as a real friend
        speed:(2.0+rng()*0.8)*mult,
        wanderA:rng()*Math.PI*2, wanderT:0,
        dodgeA:0, dodgeT:0,
        isTeammate: i < teamSize-1,
      };
    });

    // ── projectiles & particles
    const projs=[], parts=[];

    function burst(x,y,color,n=10){
      for(let i=0;i<n;i++){
        const a=Math.random()*Math.PI*2, s=1+Math.random()*4;
        parts.push({x,y,dx:Math.cos(a)*s,dy:Math.sin(a)*s,life:30+Math.random()*20,color,r:1.5+Math.random()*3});
      }
    }
    function addProj(x,y,angle,color,spd,rad){
      projs.push({x,y,dx:Math.cos(angle)*spd,dy:Math.sin(angle)*spd,color,r:rad,life:380});
    }

    // ── fire one wave entry from the boss (center)
    function fireWave(wIdx){
      const w = BOSSES[bossIdx].phases[phaseIdx][wIdx];
      const c = BOSSES[bossIdx].proj;
      const {type,count,spd,size,spread} = w;

      if(type==="radial"){
        // Evenly spaced ring, random starting angle for variety
        const offset = rng()*Math.PI*2;
        for(let i=0;i<count;i++)
          addProj(CX,CY, offset+Math.PI*2*i/count, c, spd, size);
      }
      else if(type==="spiral"){
        // Fire ONE arm each call; spiral angle increments
        for(let arm=0;arm<count;arm++)
          addProj(CX,CY, spiralAngle+Math.PI*2*arm/count, c, spd, size);
        spiralAngle += 0.22;
      }
      else if(type==="aimed"){
        // Fan aimed at player
        const base = Math.atan2(player.y-CY, player.x-CX);
        for(let i=0;i<count;i++){
          const off = (i-(count-1)/2)*(spread||0.3);
          addProj(CX,CY, base+off, c, spd, size);
        }
      }
      else if(type==="burst"){
        // Full 360 at once
        for(let i=0;i<count;i++)
          addProj(CX,CY, Math.PI*2*i/count, c, spd, size);
      }
      else if(type==="rain"){
        // Vertical columns raining down, alternating safe gaps
        const cols = 7;
        for(let col=0;col<cols;col++){
          if(col===rainCol%cols) continue; // safe column
          const x = CX - PAN_R*0.85 + col*(PAN_R*1.7/(cols-1));
          const startY = CY - PAN_R - 10;
          for(let step=0;step<5;step++)
            addProj(x, startY - step*60, Math.PI/2, c, spd+step*0.1, size);
        }
        rainCol++;
      }
    }

    // ── ACTIVATE ABILITY ─────────────────────────────────────
    function activateAbility(){
      if(abilCD>0) return;
      abilCD=ABIL_MAX;
      if(ability==="shield"){player.shieldOn=true;player.shieldT=90;}
      else if(ability==="heal"){player.healOn=true;player.healT=70;}
      else if(ability==="catch"){player.catchOn=true;player.catchT=55;}
    }

    // ── UPDATE ────────────────────────────────────────────────
    function update(){
      frame++;
      if(gameOver) return;
      const DT = 16; // ~ms per frame at 60fps

      // cooldowns
      if(abilCD>0) abilCD--;
      if(player.shieldT>0){player.shieldT--;if(!player.shieldT)player.shieldOn=false;}
      if(player.healT>0){player.healT--;if(!player.healT)player.healOn=false;}
      if(player.catchT>0){player.catchT--;if(!player.catchT)player.catchOn=false;}
      if(player.invT>0) player.invT--;

      // ── player movement (or crawl if downed)
      const keys=keysRef.current, touch=touchRef.current;
      if(player.alive || player.downed){
        let mx=0,my=0;
        if(keys["ArrowLeft"]||keys["a"]) mx-=1;
        if(keys["ArrowRight"]||keys["d"]) mx+=1;
        if(keys["ArrowUp"]||keys["w"]) my-=1;
        if(keys["ArrowDown"]||keys["s"]) my+=1;
        mx+=touch.joyX; my+=touch.joyY;
        const ml=Math.sqrt(mx*mx+my*my);
        const spd = player.downed ? 0.55 : player.speed; // crawl speed
        if(ml>0.05){
          player.x+=mx/ml*spd; player.y+=my/ml*spd;
          player.angle=Math.atan2(my,mx);
        }
        clampPan(player);
        if(player.alive){
          if((keys[" "]&&!keys._ab)||touch.abil){activateAbility();keys._ab=true;touch.abil=false;}
          if(!keys[" "]) keys._ab=false;
        }
      }

      // ── downed logic
      if(player.downed){
        const REVIVE_RANGE = 30 * 30;
        const nearBot = bots.find(b=>b.alive && b.isTeammate && d2(b,player)<REVIVE_RANGE);
        if(nearBot){
          player.reviveT++;
          if(player.reviveT>=50){
            player.downed=false; player.alive=true;
            player.hp=1; player.invT=90; player.reviveT=0;
            burst(player.x,player.y,"#66BB6A",20);
            killFeed.unshift({msg:"💚 Teammate revived you!",t:180});
            if(killFeed.length>5)killFeed.pop();
          }
        } else {
          player.reviveT=0;
        }
        // Solo: auto-revive after 7s. Team: 30s bleed-out timer
        player.downTimer--;
        if(player.downTimer<=0){
          if(!isTeamMode){
            player.downed=false; player.alive=true;
            player.hp=1; player.invT=90; player.reviveT=0;
            burst(player.x,player.y,"#FFD700",20);
            killFeed.unshift({msg:"⏱️ Back on your feet!",t:180});
            if(killFeed.length>5)killFeed.pop();
          } else {
            player.downed=false; player.alive=false; survivors--;
            burst(player.x,player.y,"#FF4444",35);
            killFeed.unshift({msg:"💀 Bled out! No one came in time.",t:200});
            if(killFeed.length>5)killFeed.pop();
          }
        }
      }
      // smooth camera
      cam.x+=(player.x-cam.x)*LERP;
      cam.y+=(player.y-cam.y)*LERP;

      // ── bot movement: wander + dodge
      const aliveBots=bots.filter(b=>b.alive);
      for(const bot of aliveBots){
        if(bot.invT>0){bot.invT--;continue;}
        // find nearest proj heading toward this bot
        let nearDist=99999, nearProj=null;
        for(const pr of projs){
          const dd=d2(bot,pr);
          // prioritize projs that are actually heading toward the bot
          const heading=Math.cos(Math.atan2(pr.dy,pr.dx)-Math.atan2(bot.y-pr.y,bot.x-pr.x));
          if(dd<nearDist&&heading>0){nearDist=dd;nearProj=pr;}
        }
        const dodgeRange = isRanked ? 160*160 : 125*125;
        const dodgeSpread = isRanked ? 0.5 : 0.8;
        if(nearProj&&nearDist<dodgeRange){
          if(bot.dodgeT<=0){
            // Dodge perpendicular to incoming proj for smarter avoidance
            const projAngle=Math.atan2(nearProj.dy,nearProj.dx);
            const perp=projAngle+Math.PI/2*(Math.random()>.5?1:-1);
            bot.dodgeA=perp+(Math.random()-.5)*dodgeSpread;
            bot.dodgeT=20+Math.floor(Math.random()*15);
          }
          bot.dodgeT--;
          bot.x+=Math.cos(bot.dodgeA)*bot.speed*1.2;
          bot.y+=Math.sin(bot.dodgeA)*bot.speed*1.2;
        } else {
          bot.dodgeT=0;
          bot.wanderT--;
          if(bot.wanderT<=0){
            // Bias wander slightly away from center to spread out more
            const awayFromCenter=Math.atan2(bot.y-CY,bot.x-CX);
            bot.wanderA=awayFromCenter+(Math.random()-.5)*Math.PI*1.4;
            bot.wanderT=45+Math.floor(Math.random()*65);
          }
          bot.x+=Math.cos(bot.wanderA)*bot.speed*0.45;
          bot.y+=Math.sin(bot.wanderA)*bot.speed*0.45;
        }
        clampPan(bot);
      }

      // ── boss wave timers (only when not between bosses)
      if(!betweenBosses){
        phaseMs+=DT;
        const bd=BOSSES[bossIdx], ph=bd.phases[phaseIdx];
        for(const wt of waveTimers){
          wt.cd-=DT;
          if(wt.cd<=0){
            if(!betweenBosses) fireWave(wt.i);
            wt.cd=ph[wt.i].delay; // reset timer for this wave
          }
        }
        // Check phase end
        if(phaseMs>=bd.phaseDur[phaseIdx]){
          if(phaseIdx<3){
            phaseIdx++;
            initPhase();
            burst(CX,CY,bd.color,30);
            killFeed.unshift({msg:`⚡ Phase ${phaseIdx+1}!`, t:160});
            if(killFeed.length>5)killFeed.pop();
          } else {
            // boss defeated
            betweenBosses=true;
            betweenTimer=3500;
            bossDefeated[bossIdx]=true;
            burst(CX,CY,bd.color,80);
            projs.length=0;
            killFeed.unshift({msg:`${bd.name} defeated! 🎉`, t:260});
            if(killFeed.length>5)killFeed.pop();
          }
        }
      } else {
        betweenTimer-=DT;
        if(betweenTimer<=0){
          if(bossIdx<3){
            bossIdx++;
            phaseIdx=0;
            betweenBosses=false;
            initPhase();
          } else {
            // all bosses done
            gameOver=true; won=true;
            setTimeout(()=>onGameEnd(1, 3),2200);
          }
        }
      }

      // ── projectiles
      for(let i=projs.length-1;i>=0;i--){
        const pr=projs[i];
        pr.x+=pr.dx; pr.y+=pr.dy; pr.life--;
        if(pr.life<=0||(pr.x-CX)**2+(pr.y-CY)**2>(PAN_R+100)**2){projs.splice(i,1);continue;}
        let rm=false;
        // hit player
        if((player.alive||player.downed)&&player.invT===0&&d2(pr,player)<(player.r+pr.r)**2){
          if(player.downed){
            if(isTeamMode){
              // In team modes, hits while downed just reset invincibility — you stay down
              player.invT=60;
              burst(player.x,player.y,"#FF8800",8);
              projs.splice(i,1); rm=true;
            } else {
              // Solo: hit while downed = eliminated
              player.downed=false; player.alive=false; survivors--;
              burst(player.x,player.y,"#FF4444",35);
              projs.splice(i,1); rm=true;
            }
          } else if(player.catchOn){
            addProj(player.x,player.y,Math.atan2(CY-player.y,CX-player.x),"#FFA726",10,pr.r);
            burst(player.x,player.y,"#FFA726",8);
            projs.splice(i,1); rm=true;
          } else if(player.shieldOn){
            burst(player.x,player.y,"#4FC3F7",8);
            projs.splice(i,1); rm=true;
          } else if(player.healOn){
            player.hp=Math.min(player.maxHp,player.hp+1);
            burst(player.x,player.y,"#66BB6A",8);
            projs.splice(i,1); rm=true;
          } else {
            player.hp--;
            player.invT=45;
            burst(player.x,player.y,"#FF4444",14);
            if(player.hp<=0){
              if(isTeamMode){
                // Go downed — 30 second timer to be revived by a teammate
                player.alive=false; player.downed=true;
                player.downTimer=1800; player.reviveT=0;
                burst(player.x,player.y,"#FF8800",20);
                killFeed.unshift({msg:"💀 You're down! Crawl to a teammate!",t:220});
                if(killFeed.length>5)killFeed.pop();
              } else {
                // Solo — go downed with 7s auto-revive timer
                player.alive=false; player.downed=true;
                player.downTimer=420; player.reviveT=0;
                burst(player.x,player.y,"#FF8800",20);
                killFeed.unshift({msg:"💀 You're down! Auto-revive in 7s...",t:220});
                if(killFeed.length>5)killFeed.pop();
              }
            }
            projs.splice(i,1); rm=true;
          }
        }
        if(rm)continue;
        // hit bot
        for(const bot of aliveBots){
          if(bot.invT>0)continue;
          if(d2(pr,bot)<(bot.r+pr.r)**2){
            bot.hp--;
            burst(bot.x,bot.y,bot.color,8);
            bot.invT=35;
            if(bot.hp<=0){
              bot.alive=false; survivors--;
              burst(bot.x,bot.y,bot.color,20);
              if(survivors%10===0&&survivors>0)
                killFeed.unshift({msg:`${survivors} kernels left`, t:150});
              if(killFeed.length>5)killFeed.pop();
            }
            projs.splice(i,1); rm=true; break;
          }
        }
      }

      // ── particles
      for(let i=parts.length-1;i>=0;i--){
        const pt=parts[i];
        pt.x+=pt.dx; pt.y+=pt.dy; pt.dy+=0.04; pt.life--;
        if(pt.life<=0)parts.splice(i,1);
      }
      killFeed=killFeed.filter(k=>{k.t--;return k.t>0;});

      // ── win/lose checks
      // win/lose checks
      const trulyDead = !player.alive && !player.downed;
      if(trulyDead&&!gameOver){gameOver=true;setTimeout(()=>onGameEnd(survivors, bossIdx),1800);}
      if((player.alive||player.downed)&&survivors===1&&!gameOver){gameOver=true;won=true;setTimeout(()=>onGameEnd(1, bossIdx),2000);}
    }

    // ── DRAW ─────────────────────────────────────────────────
    function draw(){
      ctx.clearRect(0,0,W,H);
      const cx=cam.x, cy=cam.y;

      ctx.save();
      ctx.translate(W/2,H/2);
      ctx.scale(ZOOM,ZOOM);
      ctx.translate(-cx,-cy);

      // kitchen counter outside pan
      ctx.fillStyle="#181008";
      ctx.fillRect(cx-W/ZOOM,cy-H/ZOOM,W/ZOOM*2,H/ZOOM*2);

      // ── frying pan handle
      const hAng=Math.PI*0.08;
      const hSX=CX+Math.cos(hAng)*PAN_R, hSY=CY+Math.sin(hAng)*PAN_R;
      const hEX=CX+Math.cos(hAng)*(PAN_R+380), hEY=CY+Math.sin(hAng)*(PAN_R+380);
      const perp=hAng+Math.PI/2, hw=34;
      const hg=ctx.createLinearGradient(hSX,hSY,hEX,hEY);
      hg.addColorStop(0,"#6a6a6a"); hg.addColorStop(0.3,"#aaa"); hg.addColorStop(1,"#444");
      ctx.beginPath();
      ctx.moveTo(hSX+Math.cos(perp)*hw, hSY+Math.sin(perp)*hw);
      ctx.lineTo(hSX-Math.cos(perp)*hw, hSY-Math.sin(perp)*hw);
      ctx.lineTo(hEX-Math.cos(perp)*hw*.5, hEY-Math.sin(perp)*hw*.5);
      ctx.lineTo(hEX+Math.cos(perp)*hw*.5, hEY+Math.sin(perp)*hw*.5);
      ctx.closePath();
      ctx.fillStyle=hg; ctx.fill();
      // grip wraps
      ctx.strokeStyle="rgba(0,0,0,0.4)"; ctx.lineWidth=2.5;
      for(let i=0;i<9;i++){
        const t=.3+i*.07;
        const rx=hSX+(hEX-hSX)*t, ry=hSY+(hEY-hSY)*t;
        ctx.beginPath();
        ctx.moveTo(rx+Math.cos(perp)*hw*.85, ry+Math.sin(perp)*hw*.85);
        ctx.lineTo(rx-Math.cos(perp)*hw*.85, ry-Math.sin(perp)*hw*.85);
        ctx.stroke();
      }

      // ── pan outer rim
      const rimG=ctx.createRadialGradient(CX,CY,PAN_R-8,CX,CY,PAN_R+30);
      rimG.addColorStop(0,"#888"); rimG.addColorStop(.5,"#bbb"); rimG.addColorStop(1,"#444");
      ctx.beginPath(); ctx.arc(CX,CY,PAN_R+28,0,Math.PI*2);
      ctx.fillStyle=rimG; ctx.fill();
      ctx.beginPath(); ctx.arc(CX,CY,PAN_R+22,Math.PI*1.15,Math.PI*1.85);
      ctx.strokeStyle="rgba(255,255,255,0.22)"; ctx.lineWidth=7; ctx.stroke();

      // ── pan cooking surface
      const panG=ctx.createRadialGradient(CX-PAN_R*.2,CY-PAN_R*.2,0,CX,CY,PAN_R);
      panG.addColorStop(0,"#2d2208"); panG.addColorStop(.5,"#1e1705"); panG.addColorStop(1,"#0e0e02");
      ctx.beginPath(); ctx.arc(CX,CY,PAN_R,0,Math.PI*2);
      ctx.fillStyle=panG; ctx.fill();

      // seasoning texture spots
      for(let i=0;i<22;i++){
        const a=(i/22)*Math.PI*2*3.7, r=PAN_R*(.12+.8*(i%7)/7);
        ctx.beginPath(); ctx.ellipse(CX+Math.cos(a)*r,CY+Math.sin(a)*r,10+i%7,7+i%4,a,0,Math.PI*2);
        ctx.fillStyle=`rgba(80,55,5,${.05+.03*(i%3)})`; ctx.fill();
      }

      // ── butter blobs (decorative, always visible)
      const bBlobs=[
        {x:CX-200,y:CY-170,rx:30,ry:17,rot:.5,a:.58},{x:CX+260,y:CY-90,rx:25,ry:14,rot:-.3,a:.5},
        {x:CX-130,y:CY+240,rx:36,ry:21,rot:.8,a:.55},{x:CX+170,y:CY+210,rx:22,ry:15,rot:-.6,a:.48},
        {x:CX-310,y:CY+55,rx:19,ry:11,rot:.2,a:.44},{x:CX+330,y:CY-170,rx:27,ry:17,rot:.9,a:.5},
        {x:CX+50,y:CY-380,rx:21,ry:13,rot:-.2,a:.42},{x:CX-50,y:CY+390,rx:28,ry:16,rot:.4,a:.52},
      ];
      for(const b of bBlobs){
        ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rot);
        ctx.beginPath(); ctx.ellipse(0,0,b.rx,b.ry,0,0,Math.PI*2);
        const bg=ctx.createRadialGradient(0,-b.ry*.3,0,0,0,b.rx);
        bg.addColorStop(0,`rgba(255,240,100,${b.a})`);
        bg.addColorStop(.6,`rgba(230,170,10,${b.a*.7})`);
        bg.addColorStop(1,`rgba(160,110,0,${b.a*.3})`);
        ctx.fillStyle=bg; ctx.fill();
        ctx.beginPath(); ctx.ellipse(-b.rx*.25,-b.ry*.4,b.rx*.27,b.ry*.2,0,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,200,${b.a*.5})`; ctx.fill();
        ctx.restore();
      }

      // ── salt grains (decorative)
      const sGrains=[
        {x:CX+115,y:CY+85,r:3},{x:CX-175,y:CY+145,r:2.5},{x:CX+255,y:CY-215,r:3.5},
        {x:CX-295,y:CY-155,r:2},{x:CX+375,y:CY+95,r:3},{x:CX-395,y:CY+15,r:2.5},
        {x:CX+45,y:CY-415,r:3},{x:CX-95,y:CY+415,r:2.5},{x:CX+290,y:CY+315,r:3},
        {x:CX-235,y:CY-355,r:2},{x:CX+435,y:CY-75,r:2.5},{x:CX-455,y:CY+175,r:3},
        {x:CX+80,y:CY+195,r:2},{x:CX-215,y:CY-75,r:3},{x:CX+195,y:CY-155,r:2.5},
        {x:CX-55,y:CY-255,r:2.5},{x:CX+395,y:CY-335,r:2},{x:CX-345,y:CY+295,r:2.5},
      ];
      for(const sg of sGrains){
        ctx.beginPath(); ctx.arc(sg.x,sg.y,sg.r,0,Math.PI*2);
        ctx.fillStyle="rgba(235,235,255,.55)"; ctx.fill();
        ctx.beginPath(); ctx.arc(sg.x-sg.r*.3,sg.y-sg.r*.3,sg.r*.35,0,Math.PI*2);
        ctx.fillStyle="rgba(255,255,255,.75)"; ctx.fill();
      }

      // ── heat shimmer rings (animated)
      for(let i=0;i<4;i++){
        ctx.beginPath(); ctx.arc(CX,CY,PAN_R*(.22+i*.22)+Math.sin(frame*.05+i*1.2)*5,0,Math.PI*2);
        ctx.strokeStyle=`rgba(255,140,0,${.04+i*.01})`; ctx.lineWidth=1.5; ctx.stroke();
      }
      // inner shadow
      const inS=ctx.createRadialGradient(CX,CY,PAN_R*.68,CX,CY,PAN_R);
      inS.addColorStop(0,"transparent"); inS.addColorStop(1,"rgba(0,0,0,.5)");
      ctx.beginPath(); ctx.arc(CX,CY,PAN_R,0,Math.PI*2);
      ctx.fillStyle=inS; ctx.fill();

      // ── particles
      for(const pt of parts){
        ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);
        ctx.fillStyle=pt.color; ctx.globalAlpha=Math.max(0,pt.life/45); ctx.fill(); ctx.globalAlpha=1;
      }

      // ── projectiles
      for(const pr of projs){
        // trail
        ctx.beginPath(); ctx.moveTo(pr.x,pr.y); ctx.lineTo(pr.x-pr.dx*3.5,pr.y-pr.dy*3.5);
        ctx.strokeStyle=pr.color+"88"; ctx.lineWidth=pr.r*1.2; ctx.stroke();
        // glow ball
        const g=ctx.createRadialGradient(pr.x,pr.y,0,pr.x,pr.y,pr.r);
        g.addColorStop(0,"rgba(255,255,255,.95)"); g.addColorStop(1,pr.color);
        ctx.beginPath(); ctx.arc(pr.x,pr.y,pr.r,0,Math.PI*2);
        ctx.fillStyle=g; ctx.shadowColor=pr.color; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0;
      }

      // ── bots
      // Find nearest TEAMMATE to downed player for highlighting
      const nearestReviveBot = player.downed
        ? bots.filter(b=>b.alive&&b.isTeammate).sort((a,b)=>d2(a,player)-d2(b,player))[0]
        : null;

      for(const bot of bots){
        if(!bot.alive)continue;
        // flicker when invincible
        if(bot.invT>0&&Math.floor(frame/4)%2===0) continue;
        ctx.beginPath(); ctx.ellipse(bot.x,bot.y+bot.r*.65,bot.r*.75,bot.r*.28,0,0,Math.PI*2);
        ctx.fillStyle="rgba(0,0,0,.35)"; ctx.fill();
        ctx.font=`${bot.r*2.1}px serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.shadowColor=bot.accent; ctx.shadowBlur=4;
        ctx.fillText(bot.emoji,bot.x,bot.y); ctx.shadowBlur=0;
        const bw=bot.r*2.5;
        ctx.fillStyle="#111"; ctx.fillRect(bot.x-bw/2,bot.y-bot.r-7,bw,3);
        ctx.fillStyle=bot.hp>1?"#66BB6A":"#FF4444";
        ctx.fillRect(bot.x-bw/2,bot.y-bot.r-7,bw*(bot.hp/bot.maxHp),3);

        // Show name tag for real players in room
        if(bot.isRealPlayer){
          ctx.font="bold 8px monospace"; ctx.fillStyle="#FFD700"; ctx.textAlign="center";
          ctx.shadowColor="#FFD700"; ctx.shadowBlur=6;
          ctx.fillText(`👤 ${bot.name}`, bot.x, bot.y-bot.r-10);
          ctx.shadowBlur=0;
        }

        // ── Revive triangle — only above teammates when player is downed
        if(player.downed && bot.isTeammate){
          const isNearest = nearestReviveBot && nearestReviveBot.id === bot.id;
          const triY = bot.y - bot.r - 22;
          const triSize = isNearest ? 9 + Math.sin(frame*0.18)*2 : 7; // nearest pulses
          const triColor = isNearest ? "#00BFFF" : "#4488FF";
          const triAlpha = isNearest ? 0.95 : 0.55;

          // Filled triangle pointing down (like "come here" marker)
          ctx.beginPath();
          ctx.moveTo(bot.x, triY + triSize);           // bottom point
          ctx.lineTo(bot.x - triSize, triY - triSize*0.6); // top-left
          ctx.lineTo(bot.x + triSize, triY - triSize*0.6); // top-right
          ctx.closePath();
          ctx.fillStyle = `rgba(${isNearest?'0,180,255':'60,120,255'},${triAlpha})`;
          ctx.fill();
          ctx.strokeStyle = triColor;
          ctx.lineWidth = isNearest ? 2 : 1.2;
          ctx.stroke();

          // Glow on nearest
          if(isNearest){
            ctx.beginPath();
            ctx.moveTo(bot.x, triY + triSize);
            ctx.lineTo(bot.x - triSize, triY - triSize*0.6);
            ctx.lineTo(bot.x + triSize, triY - triSize*0.6);
            ctx.closePath();
            ctx.fillStyle = `rgba(0,180,255,0.18)`;
            ctx.fill();
            // "REVIVE" label
            ctx.font="bold 6px monospace"; ctx.fillStyle="#00BFFF"; ctx.textAlign="center";
            ctx.fillText("REVIVE",bot.x, triY - triSize - 2);
          }
        }
      }

      // ── boss at center
      if(!betweenBosses||(betweenBosses&&betweenTimer>2500)){
        const bd=BOSSES[bossIdx];
        const pulse=.78+.22*Math.sin(frame*.08);
        // danger aura
        ctx.beginPath(); ctx.arc(CX,CY,55*pulse,0,Math.PI*2);
        ctx.strokeStyle=bd.color+"55"; ctx.lineWidth=6; ctx.stroke();
        ctx.beginPath(); ctx.arc(CX,CY,42,0,Math.PI*2);
        ctx.strokeStyle=bd.color+"99"; ctx.lineWidth=4; ctx.stroke();
        // boss icon (large)
        ctx.font="64px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.shadowColor=bd.color; ctx.shadowBlur=35;
        ctx.fillText(bd.icon,CX,CY); ctx.shadowBlur=0;
        // phase bar
        const dur=bd.phaseDur[phaseIdx];
        const pct=betweenBosses?1:Math.min(1,phaseMs/dur);
        const bw2=90;
        ctx.fillStyle="rgba(0,0,0,.7)"; ctx.fillRect(CX-bw2/2,CY-52,bw2,6);
        ctx.fillStyle=bd.color; ctx.fillRect(CX-bw2/2,CY-52,bw2*pct,6);
        ctx.font="8px monospace"; ctx.fillStyle=bd.color; ctx.textAlign="center";
        ctx.fillText(`Phase ${phaseIdx+1}/4`,CX,CY-57);
      } else {
        // transition flash
        ctx.font="bold 18px monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
        if(bossIdx<3){
          const next=BOSSES[bossIdx<3?bossIdx+1:3];
          ctx.fillStyle=next.color; ctx.shadowColor=next.color; ctx.shadowBlur=20;
          ctx.fillText(`Next: ${next.icon} ${next.name}`,CX,CY); ctx.shadowBlur=0;
        } else {
          ctx.fillStyle="#FFD700"; ctx.shadowColor="#FFD700"; ctx.shadowBlur=20;
          ctx.fillText("🏆 SURVIVED!",CX,CY); ctx.shadowBlur=0;
        }
      }

      // ── player (alive or downed/crawling)
      if(player.alive || player.downed){
        if(player.invT>0&&Math.floor(frame/4)%2===0){/* flicker */} else {
          ctx.save();
          if(player.downed){
            // Tilt sideways to show crawling — rotate around player center
            ctx.translate(player.x, player.y);
            ctx.rotate(Math.PI/2 + Math.sin(frame*0.2)*0.18); // slight wobble
            ctx.translate(-player.x, -player.y);
            ctx.globalAlpha = 0.75;
          }
          ctx.beginPath(); ctx.ellipse(player.x,player.y+player.r*.65,player.r*.82,player.r*.3,0,0,Math.PI*2);
          ctx.fillStyle="rgba(0,0,0,.42)"; ctx.fill();
          if(player.shieldOn&&player.alive){
            ctx.beginPath(); ctx.arc(player.x,player.y,player.r+11,0,Math.PI*2);
            ctx.strokeStyle="#4FC3F7cc"; ctx.lineWidth=3; ctx.stroke();
            ctx.beginPath(); ctx.arc(player.x,player.y,player.r+15,0,Math.PI*2);
            ctx.strokeStyle="#4FC3F733"; ctx.lineWidth=8; ctx.stroke();
          }
          ctx.font=`${player.r*2.6}px serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.shadowColor=player.downed?"#FF8800":(rankGlow||player.accent); ctx.shadowBlur=player.downed?8:18;
          ctx.fillText(player.emoji,player.x,player.y); ctx.shadowBlur=0;
          if(!player.downed){
            ctx.beginPath();
            ctx.moveTo(player.x+Math.cos(player.angle)*(player.r+1),player.y+Math.sin(player.angle)*(player.r+1));
            ctx.lineTo(player.x+Math.cos(player.angle)*(player.r+12),player.y+Math.sin(player.angle)*(player.r+12));
            ctx.strokeStyle=player.accent; ctx.lineWidth=2.5; ctx.stroke();
          }
          ctx.globalAlpha=1;
          ctx.restore();

          // YOU label (always visible)
          ctx.font="bold 7px monospace"; ctx.fillStyle=player.downed?"#FF8800":"#FFD700"; ctx.textAlign="center";
          ctx.fillText(player.downed?"DOWN":"YOU",player.x,player.y-player.r-12);

          // Downed: show revive indicator
          if(player.downed){
            // Solo: show 7s countdown bar
            if(!isTeamMode){
              const bw=38, pct=player.downTimer/420;
              ctx.fillStyle="rgba(0,0,0,.6)"; ctx.fillRect(player.x-bw/2,player.y-player.r-24,bw,5);
              ctx.fillStyle=pct>0.4?"#FF8800":"#FF4444";
              ctx.fillRect(player.x-bw/2,player.y-player.r-24,bw*pct,5);
              ctx.font="bold 7px monospace"; ctx.fillStyle="#FF8800"; ctx.textAlign="center";
              ctx.fillText(`${Math.ceil(player.downTimer/60)}s`,player.x,player.y-player.r-28);
            } else {
              // Team: show 30s countdown bar
              const bw=38, pct=player.downTimer/1800;
              ctx.fillStyle="rgba(0,0,0,.6)"; ctx.fillRect(player.x-bw/2,player.y-player.r-24,bw,5);
              ctx.fillStyle=pct>0.3?"#FF8800":"#FF4444";
              ctx.fillRect(player.x-bw/2,player.y-player.r-24,bw*pct,5);
              ctx.font="bold 7px monospace"; ctx.fillStyle="#FF8800"; ctx.textAlign="center";
              ctx.fillText(`${Math.ceil(player.downTimer/60)}s`,player.x,player.y-player.r-28);
            }
            // Green contact glow when a bot is right next to you (in revive range)
            if(player.reviveT>0){
              const revPct=player.reviveT/50;
              // Pulsing green ring
              ctx.beginPath(); ctx.arc(player.x,player.y,player.r+14+Math.sin(frame*0.3)*3,0,Math.PI*2);
              ctx.strokeStyle=`rgba(100,255,100,${0.5+revPct*0.4})`; ctx.lineWidth=3; ctx.stroke();
              // Fill arc showing progress
              ctx.beginPath(); ctx.arc(player.x,player.y,player.r+14,-Math.PI/2,-Math.PI/2+Math.PI*2*revPct);
              ctx.strokeStyle="#44FF88"; ctx.lineWidth=4; ctx.stroke();
              ctx.font="bold 6px monospace"; ctx.fillStyle="#44FF88"; ctx.textAlign="center";
              ctx.fillText("REVIVING...",player.x,player.y+player.r+22);
            }
          }
        }
      }

      ctx.restore();

      // ── HUD ─────────────────────────────────────────────────
      // top bar
      ctx.fillStyle="rgba(0,0,0,.72)"; ctx.fillRect(0,0,W,42);

      // survivor count
      ctx.font="bold 14px monospace"; ctx.fillStyle="#FFD700"; ctx.textAlign="left";
      ctx.fillText(`🍿 ${survivors} alive`,10,26);

      // boss name top center
      {
        const bd=BOSSES[bossIdx];
        if(!betweenBosses){
          const dur=bd.phaseDur[phaseIdx], pct=Math.min(1,phaseMs/dur), bw=170;
          ctx.font="10px monospace"; ctx.fillStyle=bd.color; ctx.textAlign="center";
          ctx.fillText(`${bd.icon} ${bd.name} — Phase ${phaseIdx+1}/4`,W/2,14);
          ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(W/2-bw/2,18,bw,10);
          ctx.fillStyle=bd.color; ctx.fillRect(W/2-bw/2,18,bw*pct,10);
        } else {
          ctx.font="12px monospace"; ctx.fillStyle="#FFD700"; ctx.textAlign="center";
          ctx.fillText(bossIdx<3?`${BOSSES[bossIdx].name} defeated!`:"🎉 Last boss down!",W/2,26);
        }
      }
      ctx.fillStyle="#FFD700"; ctx.textAlign="right";
      ctx.fillText(`Boss ${bossIdx+1}/4`,W-10,26);

      // ── Teammate arrow (always visible in team modes, on-screen and off-screen)
      if(isTeamMode){
        const aliveTeammates = bots.filter(b=>b.alive && b.isTeammate);
        if(aliveTeammates.length>0){
          const nearest = aliveTeammates.sort((a,b)=>d2(a,player)-d2(b,player))[0];
          // Convert teammate world pos to screen pos
          const tx = (nearest.x - cam.x)*ZOOM + W/2;
          const ty = (nearest.y - cam.y)*ZOOM + H/2;
          const onScreen = tx>20 && tx<W-20 && ty>50 && ty<H-20;
          const pulse = 0.75+0.25*Math.sin(frame*0.13);
          const color = player.downed ? "#FF4466" : "#00FF88";
          if(onScreen){
            // Arrow floating above teammate on screen
            const arrowSize=9;
            const ay=ty - (nearest.r||10)*ZOOM - 18;
            ctx.save();
            ctx.globalAlpha=pulse;
            ctx.translate(tx, ay);
            ctx.beginPath();
            ctx.moveTo(0, arrowSize);      // tip pointing down toward teammate
            ctx.lineTo(-arrowSize, -arrowSize*0.7);
            ctx.lineTo(0, -arrowSize*0.3);
            ctx.lineTo(arrowSize, -arrowSize*0.7);
            ctx.closePath();
            ctx.fillStyle=color;
            ctx.shadowColor=color; ctx.shadowBlur=10;
            ctx.fill();
            ctx.shadowBlur=0;
            ctx.globalAlpha=1;
            ctx.font="bold 8px monospace"; ctx.fillStyle=color; ctx.textAlign="center";
            ctx.fillText(nearest.name, tx, ay-10);
            ctx.restore();
          } else {
            // Pin arrow to screen edge pointing toward teammate
            const pad=28;
            const cx=W/2, cy=H/2;
            const dx=tx-cx, dy=ty-cy;
            const angle=Math.atan2(dy,dx);
            // Clamp to screen bounds
            const scaleX=(dx>0?W/2-pad:-(W/2-pad))/(dx||1);
            const scaleY=(dy>0?H/2-pad:-(H/2-pad))/(dy||1);
            const s=Math.min(Math.abs(scaleX),Math.abs(scaleY));
            const ax=cx+dx*s, ay=cy+dy*s;
            const arrowLen=13, arrowWing=8;
            ctx.save();
            ctx.translate(ax,ay);
            ctx.rotate(angle);
            ctx.globalAlpha=pulse;
            ctx.beginPath();
            ctx.moveTo(arrowLen,0);
            ctx.lineTo(-arrowWing,-arrowWing);
            ctx.lineTo(-arrowWing*0.4,0);
            ctx.lineTo(-arrowWing,arrowWing);
            ctx.closePath();
            ctx.fillStyle=color;
            ctx.shadowColor=color; ctx.shadowBlur=12;
            ctx.fill();
            ctx.shadowBlur=0;
            ctx.globalAlpha=1;
            ctx.restore();
            // Name label next to edge arrow
            ctx.save();
            ctx.font="bold 8px monospace"; ctx.fillStyle=color; ctx.textAlign="center";
            const lx=ax+Math.cos(angle+Math.PI)*22;
            const ly=ay+Math.sin(angle+Math.PI)*22;
            ctx.fillText(nearest.name, lx, ly);
            ctx.restore();
          }
        }
      }
      ctx.fillStyle="rgba(0,0,0,.55)"; ctx.fillRect(8,H-52,80,42);
      ctx.font="22px serif"; ctx.textAlign="left";
      ctx.fillText(player.hp>0?"❤️":"🖤",12,H-18);
      ctx.fillText(player.hp>1?"❤️":"🖤",46,H-18);

      // ability bar
      const ab=ABILITIES.find(a=>a.id===ability);
      const cdP=abilCD/ABIL_MAX;
      ctx.fillStyle="rgba(0,0,0,.65)"; ctx.fillRect(W/2-74,H-52,148,44);
      ctx.fillStyle=abilCD>0?"#222":ab.color; ctx.fillRect(W/2-72,H-50,144*(1-cdP),40);
      ctx.font="13px monospace"; ctx.fillStyle="#fff"; ctx.textAlign="center";
      ctx.fillText(`${ab.icon} ${ab.name}`,W/2,H-26);
      if(abilCD>0){ctx.font="10px monospace";ctx.fillStyle="#aaa";ctx.fillText(`${Math.ceil(abilCD/60)}s`,W/2,H-12);}

      // boss progress bottom-left
      for(let i=0;i<4;i++){
        ctx.font="10px monospace"; ctx.textAlign="left";
        ctx.fillStyle=bossDefeated[i]?"#66BB6A":(i===bossIdx&&!betweenBosses?"#FFD700":"#444");
        ctx.fillText(`${bossDefeated[i]?"✅":"⬜"} ${BOSSES[i].icon} ${BOSSES[i].name}`,10,H-66-i*17);
      }

      // kill feed
      killFeed.forEach((k,idx)=>{
        const a=Math.min(1,k.t/40);
        ctx.fillStyle=`rgba(0,0,0,${.5*a})`;
        ctx.fillRect(W-238,44+idx*22,228,18);
        ctx.font="10px monospace"; ctx.fillStyle=`rgba(255,215,0,${a})`; ctx.textAlign="right";
        ctx.fillText(k.msg,W-10,57+idx*22);
      });

      // controls hint
      if(frame<180){
        ctx.fillStyle="rgba(255,255,255,.26)"; ctx.font="11px monospace"; ctx.textAlign="center";
        ctx.fillText("WASD = Move    SPACE = Ability    Dodge the boss!",W/2,H-60);
      }

      // ── minimap (circular, top-right)
      const MM=86, mmX=W-MM-10, mmY=46;
      ctx.save();
      ctx.beginPath(); ctx.arc(mmX+MM/2,mmY+MM/2,MM/2,0,Math.PI*2);
      ctx.fillStyle="rgba(0,0,0,.72)"; ctx.fill(); ctx.clip();
      const mmS=MM/(PAN_R*2.1), mmCX=mmX+MM/2, mmCY=mmY+MM/2;
      ctx.beginPath(); ctx.arc(mmCX,mmCY,PAN_R*mmS,0,Math.PI*2);
      ctx.fillStyle="rgba(40,28,5,.9)"; ctx.fill();
      // boss dot
      ctx.beginPath(); ctx.arc(mmCX,mmCY,4,0,Math.PI*2);
      ctx.fillStyle=BOSSES[bossIdx].color; ctx.fill();
      // bot dots
      bots.filter(b=>b.alive).forEach(b=>{
        ctx.beginPath(); ctx.arc(mmCX+(b.x-CX)*mmS,mmCY+(b.y-CY)*mmS,1.8,0,Math.PI*2);
        ctx.fillStyle="#FF8888"; ctx.fill();
      });
      // player dot (gold=alive, orange=downed)
      if(player.alive||player.downed){
        ctx.beginPath(); ctx.arc(mmCX+(player.x-CX)*mmS,mmCY+(player.y-CY)*mmS,3,0,Math.PI*2);
        ctx.fillStyle=player.downed?"#FF8800":"#FFD700"; ctx.fill();
      }
      ctx.restore();
      ctx.strokeStyle="rgba(255,165,0,.5)"; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(mmX+MM/2,mmY+MM/2,MM/2,0,Math.PI*2); ctx.stroke();

      // ── win / lose overlays
      if(won){
        ctx.fillStyle="rgba(0,0,0,.75)"; ctx.fillRect(0,0,W,H);
        ctx.font="bold 52px serif"; ctx.fillStyle="#FFD700"; ctx.textAlign="center";
        ctx.shadowColor="#FFD700"; ctx.shadowBlur=40;
        ctx.fillText("🏆 WINNER!",W/2,H/2-18); ctx.shadowBlur=0;
        ctx.font="18px monospace"; ctx.fillStyle="#fff";
        ctx.fillText("Last kernel standing! Opening chest...",W/2,H/2+28);
      } else if(gameOver&&!won){
        ctx.fillStyle="rgba(0,0,0,.75)"; ctx.fillRect(0,0,W,H);
        ctx.font="bold 48px serif"; ctx.fillStyle="#FF4444"; ctx.textAlign="center";
        ctx.fillText("💀 POPPED!",W/2,H/2-18);
        ctx.font="16px monospace"; ctx.fillStyle="#aaa";
        ctx.fillText("You couldn't take the heat...",W/2,H/2+18);
        ctx.font="13px monospace"; ctx.fillStyle="#FFD700";
        ctx.fillText("🎁 Opening your chest anyway!",W/2,H/2+44);
      }
      // Down but not dead — show big pulsing warning
      if(player.downed&&!gameOver){
        const pulse=0.6+0.4*Math.sin(frame*0.18);
        ctx.fillStyle=`rgba(255,100,0,${0.12*pulse})`;
        ctx.fillRect(0,0,W,H);
        ctx.font=`bold ${14+pulse*3}px monospace`; ctx.fillStyle=`rgba(255,140,0,${0.7+pulse*0.3})`; ctx.textAlign="center";
        if(isTeamMode){
          ctx.fillText("⚠️ YOU'RE DOWN — CRAWL TO A TEAMMATE!",W/2,H-80);
          const secsLeft=Math.ceil(player.downTimer/60);
          ctx.font="12px monospace"; ctx.fillStyle=`rgba(255,${secsLeft<=10?60:140},0,${0.7+pulse*0.3})`;
          ctx.fillText(`Bleed out in ${secsLeft}s`,W/2,H-62);
        } else {
          ctx.fillText("⚠️ YOU'RE DOWN — AUTO-REVIVE INCOMING!",W/2,H-80);
          const secsLeft=Math.ceil(player.downTimer/60);
          ctx.font="12px monospace"; ctx.fillStyle=`rgba(255,80,80,${0.7+pulse*0.3})`;
          ctx.fillText(`Auto-revive in ${secsLeft}s`,W/2,H-62);
        }
      }
    }

    function loop(){update();draw();animRef.current=requestAnimationFrame(loop);}
    animRef.current=requestAnimationFrame(loop);
    const kd=e=>{keysRef.current[e.key]=true;};
    const ku=e=>{keysRef.current[e.key]=false;};
    window.addEventListener("keydown",kd);
    window.addEventListener("keyup",ku);
    return()=>{cancelAnimationFrame(animRef.current);window.removeEventListener("keydown",kd);window.removeEventListener("keyup",ku);};
  },[]);

  // touch joystick
  function onJoyStart(e){e.preventDefault();joyRef.current={active:true,sx:e.touches[0].clientX,sy:e.touches[0].clientY};}
  function onJoyMove(e){e.preventDefault();if(!joyRef.current.active)return;const t=e.touches[0];touchRef.current.joyX=Math.max(-1,Math.min(1,(t.clientX-joyRef.current.sx)/40));touchRef.current.joyY=Math.max(-1,Math.min(1,(t.clientY-joyRef.current.sy)/40));}
  function onJoyEnd(e){e.preventDefault();joyRef.current.active=false;touchRef.current.joyX=0;touchRef.current.joyY=0;}

  return(
    <div style={{position:"relative",width:"100%",maxWidth:760,margin:"0 auto"}}>
      <canvas ref={canvasRef} width={760} height={560} style={{width:"100%",height:"auto",display:"block",borderRadius:16,border:"2px solid rgba(255,165,0,.35)"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 10px 4px",gap:8}}>
        <div onTouchStart={onJoyStart} onTouchMove={onJoyMove} onTouchEnd={onJoyEnd}
          style={{width:108,height:108,borderRadius:"50%",background:"rgba(255,255,255,.07)",border:"2px solid rgba(255,165,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",touchAction:"none",userSelect:"none",flexShrink:0}}>
          <span style={{fontSize:24,opacity:.35}}>🕹️</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,alignItems:"center"}}>
          <button onTouchStart={e=>{e.preventDefault();touchRef.current.abil=true;}} onTouchEnd={()=>{}}
            style={{width:72,height:72,borderRadius:"50%",background:"rgba(255,165,0,.2)",border:"2px solid #FFA500",color:"#FFA500",fontSize:24,cursor:"pointer",touchAction:"none"}}>✨</button>
        </div>
        <div style={{width:108,height:108,borderRadius:12,background:"rgba(255,255,255,.03)",border:"1px solid rgba(100,100,200,.18)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{fontSize:10,color:"rgba(255,255,255,.22)",textAlign:"center",fontFamily:"monospace",lineHeight:1.7}}>WASD/Arrows<br/>to Move<br/>Space=Ability<br/>DODGE!</span>
        </div>
      </div>
    </div>
  );
}

// ─── CHEST SCREEN ─────────────────────────────────────────────
function Stars({count,glow}){
  const isUltra = count >= 6;
  const isAdmin = count >= 7;
  return <div style={{display:"flex",gap:5,justifyContent:"center",margin:"10px 0",flexWrap:"wrap"}}>
    {isAdmin
      ? [0,1,2].map(i=><span key={i} style={{fontSize:22,filter:`drop-shadow(0 0 10px ${glow})`,transition:`all 0.3s ${i*110}ms`}}>👑</span>)
      : isUltra
        ? [0,1,2,3,4].map(i=><span key={i} style={{fontSize:22,filter:`drop-shadow(0 0 14px #FF00FF)`,animation:`ultraFloat ${1+i*0.15}s ease-in-out infinite`,transition:`all 0.3s ${i*110}ms`}}>✦</span>)
        : [0,1,2,3,4].map(i=><span key={i} style={{fontSize:22,filter:i<count?`drop-shadow(0 0 10px ${glow})`:"grayscale(1) opacity(.18)",transition:`all 0.3s ${i*110}ms`}}>⭐</span>)
    }
  </div>;
}
function ChestScreen({unlockedKernels, placement, isRanked, rpChange, xpGained, dailyBonus, onClaim}){
  const[phase,setPhase]=useState("idle");
  const[reward,setReward]=useState(null);
  const open=()=>{
    setPhase("shaking");
    setTimeout(()=>{ setReward(isRanked?rollChestRanked(placement):rollChest(placement)); setPhase("reveal"); },1400);
  };
  const rar = reward ? RARITY[reward.rarity] : null;
  const isDupe = reward && unlockedKernels.some(k=>k.id===reward.id);
  const dupeCount = reward ? unlockedKernels.filter(k=>k.id===reward.id).length : 0;

  const isWin = placement === 1;
  const placeBadge = placement===1 ? "🏆 #1 WINNER" : placement<=3 ? `🥈 Top 3` : placement<=10 ? `🎯 Top 10` : placement<=20 ? `👍 Top 20` : `💀 #${placement}`;
  const placeColor = placement===1?"#FFD700":placement<=3?"#C0C0C0":placement<=10?"#CD7F32":"#888";
  const boostedOdds = getOddsForPlacement(placement);
  const trophiesEarned = !isRanked ? calcTrophies(placement) : 0;

  return(
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at center,#1a0a2e,#0d0500 70%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Courier New',monospace",color:"#fff",padding:24}}>

      {/* Placement badge */}
      <div style={{fontSize:13,fontWeight:900,color:placeColor,textShadow:`0 0 14px ${placeColor}`,letterSpacing:3,marginBottom:4}}>{placeBadge}</div>
      {isRanked&&rpChange!=null&&<div style={{fontSize:16,fontWeight:900,marginBottom:4,color:rpChange>=0?"#66FF88":"#FF6644",textShadow:`0 0 12px ${rpChange>=0?"#00FF44":"#FF4400"}`}}>{rpChange>=0?`▲ +${rpChange} RP`:`▼ ${rpChange} RP`}</div>}
      {xpGained>0&&<div style={{fontSize:13,color:"#FFD700",marginBottom:4}}>⭐ +{xpGained} XP</div>}
      {trophiesEarned>0&&<div style={{fontSize:13,color:"#FFD700",marginBottom:4,background:"rgba(255,215,0,.1)",border:"1px solid rgba(255,215,0,.3)",borderRadius:8,padding:"3px 12px"}}>🏆 +{trophiesEarned} Trophies</div>}
      {dailyBonus>0&&<div style={{fontSize:13,color:"#FFA500",marginBottom:4,background:"rgba(255,165,0,.1)",border:"1px solid rgba(255,165,0,.3)",borderRadius:8,padding:"3px 12px"}}>📋 Daily Challenge Complete! +{dailyBonus} RP</div>}
      <div style={{fontSize:22,fontWeight:900,color:"#FFD700",textShadow:"0 0 20px #FFD700",marginBottom:4}}>🎁 REWARD TIME!</div>
      <div style={{color:"#666",marginBottom:6,fontSize:12}}>{isRanked?"Ranked match — boosted chest odds! 🏆":"Every game earns a chest. Better placement = better odds."}</div>

      {/* Odds strip */}
      {phase==="idle"&&<div style={{display:"flex",gap:8,marginBottom:28,flexWrap:"wrap",justifyContent:"center"}}>
        {Object.entries(RARITY).filter(([k])=>k!=="admin_exclusive").reverse().map(([key,cfg])=>{
          const pct=boostedOdds[key]||"0.001";
          const baseChance=Math.round(cfg.chance*100);
          const boosted=key!=="ultra"&&pct>baseChance;
          const nerfed=key!=="ultra"&&pct<baseChance;
          const isUltra=key==="ultra";
          return <div key={key} style={{textAlign:"center",padding:"6px 10px",background:isUltra?"rgba(255,0,255,.08)":"rgba(255,255,255,.04)",borderRadius:10,border:`1px solid ${cfg.color}${isUltra?"88":"44"}`,minWidth:64,boxShadow:isUltra?`0 0 12px ${cfg.glow}44`:"none"}}>
            <div style={{display:"flex",gap:2,justifyContent:"center",marginBottom:3}}>
              {[...Array(Math.min(cfg.stars,5))].map((_,i)=><span key={i} style={{fontSize:8,color:cfg.color}}>⭐</span>)}
              {isUltra&&<span style={{fontSize:8,color:"#FF00FF"}}>✦</span>}
            </div>
            <div style={{fontSize:10,color:cfg.color,fontWeight:700}}>{isUltra?"0.001%":`${pct}%`}</div>
            {boosted&&<div style={{fontSize:8,color:"#66FF88"}}>▲ boosted</div>}
            {nerfed&&<div style={{fontSize:8,color:"#FF6644"}}>▼ reduced</div>}
            {isUltra&&<div style={{fontSize:8,color:"#FF00FF"}}>ULTRA</div>}
          </div>;
        })}
      </div>}

      {phase==="idle"&&<div style={{textAlign:"center"}}>
        <div onClick={open} style={{fontSize:96,cursor:"pointer",display:"inline-block",filter:`drop-shadow(0 0 24px ${isWin?"#FFD700":"#FF8C00"})`,transition:"transform .2s"}}
          onMouseOver={e=>e.currentTarget.style.transform="scale(1.1) translateY(-8px)"}
          onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
          {isWin?"🏆":"🎁"}
        </div>
        <div style={{color:"#555",fontSize:12,marginTop:10}}>Tap to open</div>
      </div>}

      {phase==="shaking"&&<div style={{fontSize:96,animation:"chestShake .12s infinite"}}>{isWin?"🏆":"🎁"}</div>}

      {phase==="reveal"&&reward&&rar&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,animation:reward.rarity==="ultra"?"ultraReveal 1s ease":"popIn .6s ease"}}>

        {/* Ultra full-screen flash */}
        {reward.rarity==="ultra"&&<div style={{position:"fixed",inset:0,pointerEvents:"none",background:"radial-gradient(ellipse,rgba(255,0,255,.18),transparent 70%)",zIndex:0,animation:"ultraPulse 1.5s ease-in-out infinite"}}/>}

        <div style={{
          background: reward.rarity==="ultra"
            ? "radial-gradient(circle,#2a0040,#0d0d0d 75%)"
            : reward.rarity==="admin_exclusive"
              ? "radial-gradient(circle,#3a0000,#0d0d0d 75%)"
              : `radial-gradient(circle,${rar.bg},#0d0d0d 75%)`,
          border:`3px solid ${rar.color}`,
          borderRadius:24,padding:"24px 44px",
          boxShadow: reward.rarity==="ultra"
            ? "0 0 80px #FF00FF88, 0 0 30px #FF00FF44"
            : reward.rarity==="admin_exclusive"
              ? "0 0 60px #FF000066, 0 0 20px #FFD70044"
              : `0 0 50px ${rar.glow}66`,
          textAlign:"center",position:"relative",zIndex:1
        }}>

// ─── ACHIEVEMENT TOAST ────────────────────────────────────────
function AchievementToast({achievements, onDone}){
  const [idx,setIdx]=useState(0);
  useEffect(()=>{
    if(idx>=achievements.length){onDone();return;}
    const t=setTimeout(()=>setIdx(i=>i+1),2800);
    return()=>clearTimeout(t);
  },[idx,achievements,onDone]);
  if(idx>=achievements.length) return null;
  const a=achievements[idx];
  return(
    <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:999,background:"linear-gradient(135deg,#1a1a00,#2a2000)",border:"2px solid #FFD700",borderRadius:16,padding:"14px 24px",textAlign:"center",fontFamily:"monospace",boxShadow:"0 0 30px #FFD70066",animation:"slideDown .3s ease",minWidth:260}}>
      <div style={{fontSize:9,color:"#FFD700",letterSpacing:3,marginBottom:4}}>🏅 ACHIEVEMENT UNLOCKED</div>
      <div style={{fontSize:28}}>{a.icon}</div>
      <div style={{fontSize:15,fontWeight:900,color:"#FFD700",marginTop:4}}>{a.label}</div>
      <div style={{fontSize:11,color:"#aaa",marginTop:2}}>{a.desc}</div>
    </div>
  );
}

async function sbFetch(path, opts={}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers:{
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": opts.prefer||"return=representation",
      ...opts.headers
    },
    ...opts
  });
  if(!res.ok){ const err=await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function updateAccount(username, data){
  // Map camelCase to snake_case for Supabase columns
  const mapped = {};
  if(data.selectedKernelId   !== undefined) mapped.selected_kernel_id   = data.selectedKernelId;
  if(data.selectedAbility    !== undefined) mapped.selected_ability      = data.selectedAbility;
  if(data.unlockedKernelIds  !== undefined) mapped.unlocked_kernel_ids   = data.unlockedKernelIds;
  if(data.rankPoints         !== undefined) mapped.rank_points            = data.rankPoints;
  if(data.winStreak          !== undefined) mapped.win_streak             = data.winStreak;
  if(data.stats              !== undefined) mapped.stats                  = data.stats;
  if(data.achievements       !== undefined) mapped.achievements           = data.achievements;
  if(data.dailyProgress      !== undefined) mapped.daily_progress         = data.dailyProgress;
  if(data.banned             !== undefined) mapped.banned                 = data.banned;
  if(data.ban_reason         !== undefined) mapped.ban_reason             = data.ban_reason;
  if(data.xp                 !== undefined){ mapped.xp = data.xp; }

  mapped.last_seen = new Date().toISOString();
  try{
    await sbFetch(`accounts?username=eq.${encodeURIComponent(username.toLowerCase())}`,{
      method:"PATCH", body:JSON.stringify(mapped), prefer:"return=minimal"
    });
  }catch(e){ console.warn("updateAccount failed",e); }
}

async function joinRoom(code, username){
  try{
    const rows = await sbFetch(`rooms?code=eq.${code}&limit=1`);
    if(!rows?.length) return null;
    const room = rows[0];
    const players = room.players||[];
    if(!players.includes(username.toLowerCase())) players.push(username.toLowerCase());
    await sbFetch(`rooms?code=eq.${code}`,{method:"PATCH",body:JSON.stringify({players}),prefer:"return=minimal"});
    return room;
  }catch(e){ return null; }
}

function PopcornBattle(){
  const sessionUser = loadSession();

  const[screen,setScreen]=useState(sessionUser ? "loading" : "login");
  const[username,setUsername]=useState("");
  const usernameRef = useRef("");
  const[usernameInput,setUsernameInput]=useState("");
  const[pinInput,setPinInput]=useState("");
  const[loginMode,setLoginMode]=useState("new");
  const[roomCode,setRoomCode]=useState("");
  const[roomInput,setRoomInput]=useState("");
  const[gameMode,setGameMode]=useState("solo");
  const[selectedKernel,setSelectedKernel]=useState(KERNELS[0]);
  const[selectedAbility,setSelectedAbility]=useState("shield");
  const[unlockedKernels,setUnlockedKernels]=useState([KERNELS[0]]);
  const[showCollection,setShowCollection]=useState(false);
  const[showTutorial,setShowTutorial]=useState(false);
  const[playMode,setPlayMode]=useState("normal");
  const[rankPoints,setRankPoints]=useState(0);
  const[trophies,setTrophies]=useState(0);
  const[unlockedGlows,setUnlockedGlows]=useState([]);
  const[selectedGlow,setSelectedGlow]=useState(null);
  const[showTrophyRoad,setShowTrophyRoad]=useState(false);
  const[newTrophyRewards,setNewTrophyRewards]=useState([]);
  const[winStreak,setWinStreak]=useState(0);
  const[stats,setStats]=useState({totalGames:0,wins:0,top10s:0,top3s:0,survivedMicrowave:0,bestStreak:0,xp:0,bestRank:"bronze",legendaryCount:0});
  const[xp,setXp]=useState(0);
  const[achievements,setAchievements]=useState([]);
  const[newAchievements,setNewAchievements]=useState([]);
  const[adminGifts,setAdminGifts]=useState([]);
  const[adminBroadcast,setAdminBroadcast]=useState(null); // {type:"message"|"poll", message, id}
  const[pollVoted,setPollVoted]=useState(null); // "yes"|"no"|null
  const broadcastSeenRef=useRef(null); // tracks last seen broadcast created_at
  const[dailyProgress,setDailyProgress]=useState({});
  const[showStats,setShowStats]=useState(false);
  const[showAchievements,setShowAchievements]=useState(false);
  const[error,setError]=useState("");
  const[gameKey,setGameKey]=useState(0);
  const[countdown,setCountdown]=useState(null);
  const[lobbyBots,setLobbyBots]=useState([]);
  const[placement,setPlacement]=useState(60);
  const[rpChange,setRpChange]=useState(null);
  const[xpGained,setXpGained]=useState(0);
  const[dailyBonus,setDailyBonus]=useState(0);

  const unlockedKernelsRef = useRef(unlockedKernels);
  useEffect(()=>{ unlockedKernelsRef.current = unlockedKernels; },[unlockedKernels]);

  // Load account data from Supabase on mount if session exists
  useEffect(()=>{
    if(!sessionUser){ setScreen("login"); return; }
    getAccount(sessionUser).then(acct=>{
      if(!acct){ clearSession(); setScreen("login"); return; }
      if(acct.banned){ clearSession(); setScreen("login"); setError(`Account banned: ${acct.ban_reason||"Contact admin."}`); return; }
      loadAccountIntoState(acct);
      setScreen("lobby");
      buildLobby(acct.stats?.gameMode||"solo");
    }).catch(()=>{ clearSession(); setScreen("login"); });
  },[]);

  // Poll Supabase every 6s for admin bans/gifts/broadcasts while logged in
  useEffect(()=>{
    if(!username) return;
    const interval = setInterval(async()=>{
      const fresh = await getAccount(username);
      if(!fresh) return;
      if(fresh.banned){
        clearSession();
        setUsername(""); usernameRef.current=""; setScreen("login"); setLoginMode("new");
        setError(`Your account was banned: ${fresh.ban_reason||"Contact admin."}`);
        return;
      }
      // Detect gifted skins
      const currentKernels = unlockedKernelsRef.current;
      const freshIds = fresh.unlocked_kernel_ids||[];
      const freshKernels = freshIds.map(id=>KERNELS.find(k=>k.id===id)||KERNELS[0]);
      if(freshKernels.length > currentKernels.length){
        const tempOld = currentKernels.map(k=>k.id);
        const newSkinIds = freshIds.filter(id=>{ const i=tempOld.indexOf(id); if(i!==-1){tempOld.splice(i,1);return false;} return true; });
        const giftedSkins = newSkinIds.map(id=>KERNELS.find(k=>k.id===id)).filter(Boolean);
        setUnlockedKernels(freshKernels);
        if(giftedSkins.length>0) setAdminGifts(giftedSkins);
      }
      // Check for admin broadcast/poll
      try{
        const rows = await sbFetch("broadcast?id=eq.1&limit=1");
        if(rows?.length){
          const bc=rows[0];
          const dismissedKey = `popcorn_broadcast_seen_${bc.created_at}`;
          const alreadySeen = localStorage.getItem(dismissedKey);
          if(bc.created_at !== broadcastSeenRef.current && !alreadySeen){
            broadcastSeenRef.current = bc.created_at;
            setPollVoted(null);
            setAdminBroadcast({type:bc.type, message:bc.message, createdAt:bc.created_at, votes_yes:bc.votes_yes||0, votes_no:bc.votes_no||0});
          } else if(bc.type==="poll" && bc.created_at === broadcastSeenRef.current){
            setAdminBroadcast(prev=>prev?.createdAt===bc.created_at?{...prev,votes_yes:bc.votes_yes||0,votes_no:bc.votes_no||0}:prev);
          }
        } else {
          setAdminBroadcast(null);
        }
      }catch(e){}
    }, 6000);
    return ()=>clearInterval(interval);
  },[username]);

  function loadAccountIntoState(acct){
    setUsername(acct.username); usernameRef.current=acct.username;
    const ids = acct.unlocked_kernel_ids||[KERNELS[0].id];
    setUnlockedKernels(ids.map(id=>KERNELS.find(k=>k.id===id)||KERNELS[0]));
    setSelectedKernel(KERNELS.find(k=>k.id===acct.selected_kernel_id)||KERNELS[0]);
    setSelectedAbility(acct.selected_ability||"shield");
    setRankPoints(acct.rank_points||0);
    setWinStreak(acct.win_streak||0);
    setTrophies(acct.stats?.trophies||0);
    setUnlockedGlows(acct.stats?.unlockedGlows||[]);
    setSelectedGlow(acct.stats?.selectedGlow||null);
    const s = acct.stats||{totalGames:0,wins:0,top10s:0,top3s:0,survivedMicrowave:0,bestStreak:0,xp:0,bestRank:"bronze1",legendaryCount:0};
    setStats(s); setXp(s.xp||acct.xp||0);
    setAchievements(acct.achievements||[]);
    setDailyProgress(acct.daily_progress||{});
  }

  // ── auto-save to Supabase whenever anything changes (debounced)
  const saveTimer = useRef(null);
  useEffect(()=>{
    if(!username) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>{
      updateAccount(username,{
        selectedKernelId: selectedKernel.id,
        selectedAbility,
        unlockedKernelIds: unlockedKernels.map(k=>k.id),
        rankPoints,
        winStreak,
        stats:{...stats, xp, trophies, unlockedGlows, selectedGlow},
        achievements,
        dailyProgress,
        xp,
      });
    }, 1500);
  },[username,selectedKernel,selectedAbility,unlockedKernels,rankPoints,winStreak,stats,xp,achievements,dailyProgress,trophies,unlockedGlows,selectedGlow]);

  function buildLobby(mode){const m=GAME_MODES.find(x=>x.id===mode)||GAME_MODES[0];setLobbyBots(Array.from({length:m.teamSize-1},()=>({name:rndBotName(),k:rndKernel()})));}

  async function handleLogin(){
    const uname=usernameInput.trim();
    if(!uname){setError("Enter a username!");return;}
    if(pinInput.length!==4||!/^\d{4}$/.test(pinInput)){setError("PIN must be exactly 4 digits!");return;}
    setError("Connecting...");
    try{
      const existing=await getAccount(uname);
      if(loginMode==="returning"){
        if(!existing){setError("Account not found. Switch to New Account.");return;}
        if(existing.pin!==pinInput){setError("Wrong PIN!");return;}
        if(existing.banned){setError(`Account banned: ${existing.ban_reason||"Contact admin."}`);return;}
        loadAccountIntoState(existing);
        saveSession(existing.username);
        setScreen("lobby");
        buildLobby("solo");
        setError("");
      } else {
        if(existing){setError("Username taken! Switch to Returning Player.");return;}
        const acct=await createAccount(uname,pinInput);
        loadAccountIntoState(acct);
        saveSession(acct.username||uname.toLowerCase());
        setScreen("lobby");
        buildLobby("solo");
        setShowTutorial(true);
        setError("");
      }
    }catch(e){
      setError("Connection error. Check your internet and try again.");
    }
  }

  function handleLogout(){
    clearSession();
    setUsername(""); usernameRef.current=""; setUsernameInput(""); setPinInput("");
    setScreen("login"); setLoginMode("new");
  }

    console.log("teammates to fetch:", teammates);
    if(teammates.length>0){
      try{
        const accts = await Promise.all(teammates.map(p=>sbFetch(`accounts?username=eq.${encodeURIComponent(p)}&limit=1`)));
        const tmData = accts.map((rows,i)=>{
          const acct = rows?.[0];
          const kernel = KERNELS.find(k=>k.id===acct?.selected_kernel_id)||KERNELS[0];
          console.log("teammate", teammates[i], "kernel:", kernel.name);
          return {username:teammates[i], kernel, emoji:kernel.emoji, color:kernel.color, accent:kernel.accent};
        });
        setRoomTeammates(tmData);
        roomTeammatesRef.current = tmData;
        console.log("roomTeammatesRef set to:", tmData);
      }catch(e){ console.error("fetchTeammates error:", e); }

  // Poll room state every 2s when in a room

  useEffect(()=>{
    if(!roomCode||!username){
      clearInterval(roomPollRef.current);
      return;
    }
    async function pollRoom(){
      const room = await getRoom(roomCode);
      if(!room) return;
      const players = room.players||[];
      setRoomPlayers(players);
      const gm = room.game_mode||"solo";
      setGameMode(gm);
      roomGameModeRef.current = gm;
      // Fetch kernel data for all teammates (everyone except self)
      const teammates = players.filter(p=>p!==username.toLowerCase());
      if(teammates.length>0){
        try{
          const accts = await Promise.all(teammates.map(p=>sbFetch(`accounts?username=eq.${encodeURIComponent(p)}&limit=1`)));
          const tmData = accts.map((rows,i)=>{
            const acct = rows?.[0];
            const kernel = KERNELS.find(k=>k.id===acct?.selected_kernel_id)||KERNELS[0];
            return {username:teammates[i], kernel, emoji:kernel.emoji, color:kernel.color, accent:kernel.accent};
          });
          setRoomTeammates(tmData);
          roomTeammatesRef.current = tmData;
        }catch(e){}
      } else {
        setRoomTeammates([]);
      }
      // If host triggered start (status==="started"), everyone launches
      if(room.status==="started" && room.seed){
        setRoomSeed(room.seed);
        roomGameModeRef.current = gm;
        clearInterval(roomPollRef.current);
        await fetchTeammatesAndLaunch(players);
      }
    }
    pollRoom();
    roomPollRef.current = setInterval(pollRoom, 2000);
    return ()=>clearInterval(roomPollRef.current);

  async function handleCreate(){
    const code=genCode();
    const seed=Math.floor(Math.random()*999999);
    setRoomCode(code);
    setRoomSeed(seed);
    setIsHost(true);
    setError("");
    buildLobby(gameMode);
    try{
      await sbFetch("rooms",{method:"POST",body:JSON.stringify({
        code, host:username.toLowerCase(),
        game_mode:gameMode, is_ranked:playMode==="ranked",
        status:"waiting", players:[username.toLowerCase()], seed
      }),prefer:"return=minimal"});
    }catch(e){ setError("Could not create room. Check connection."); }
  }

  async function handleJoin(){
    if(!roomInput.trim()){setError("Enter a room code!");return;}
    const code=roomInput.trim().toUpperCase();
    try{
      const rows=await sbFetch(`rooms?code=eq.${code}&limit=1`);
      if(!rows?.length){setError("Room not found! Check the code.");return;}
      const room=rows[0];
      if(room.status==="started"){setError("That game already started!");return;}
      const players=room.players||[];
      if(!players.includes(username.toLowerCase())) players.push(username.toLowerCase());
      await sbFetch(`rooms?code=eq.${code}`,{method:"PATCH",body:JSON.stringify({players}),prefer:"return=minimal"});
      setRoomCode(code);
      setRoomSeed(room.seed||0);
      setIsHost(false);
      setGameMode(room.game_mode||"solo");
      setError("");
      buildLobby(room.game_mode||"solo");
    }catch(e){ setError("Connection error joining room."); }
  }

  async function handleStartGame(){
    try{
      const rows = await sbFetch(`rooms?code=eq.${roomCode}&limit=1`);
      const players = rows?.[0]?.players||[];
      await sbFetch(`rooms?code=eq.${roomCode}`,{method:"PATCH",body:JSON.stringify({status:"started"}),prefer:"return=minimal"});
      await fetchTeammatesAndLaunch(players);
    }catch(e){ setCountdown(3); }
  }

  async function handleLeaveRoom(){
    if(!roomCode) return;
    try{
      const rows=await sbFetch(`rooms?code=eq.${roomCode}&limit=1`);
      if(rows?.length){
        const room=rows[0];
        const updated=(room.players||[]).filter(p=>p!==username.toLowerCase());
        if(updated.length===0 || isHost){
          // Delete room if empty or host left
          await sbFetch(`rooms?code=eq.${roomCode}`,{method:"DELETE",prefer:"return=minimal"});
        } else {
          await sbFetch(`rooms?code=eq.${roomCode}`,{method:"PATCH",body:JSON.stringify({players:updated}),prefer:"return=minimal"});
        }
      }
    }catch(e){}
    clearInterval(roomPollRef.current);
    setRoomCode(""); setRoomInput(""); setIsHost(false); setRoomPlayers([]); setRoomTeammates([]); roomTeammatesRef.current=[];
  }

  function handleGameEnd(place, bossReached=0){
    const p = place||60;
    const isWin = p===1;
    const today = getTodayKey();
    const challenge = getDailyChallenge();
    let bonusRp=0, newAch=[];

    // ── Win streak
    const newStreak = isWin ? winStreak+1 : 0;
    setWinStreak(newStreak);

    // ── XP
    const gainedXp = xpForGame(p);
    const newXp = xp + gainedXp;
    setXp(newXp);
    setXpGained(gainedXp);

    // ── Stats
    const legCount = unlockedKernels.filter(k=>k.rarity==="legendary"||k.rarity==="ultra").length;
    const newStats = {
      totalGames: (stats.totalGames||0)+1,
      wins: (stats.wins||0)+(isWin?1:0),
      top10s: (stats.top10s||0)+(p<=10?1:0),
      top3s: (stats.top3s||0)+(p<=3?1:0),
      survivedMicrowave: (stats.survivedMicrowave||0)+(bossReached>=3?1:0),
      bestStreak: Math.max(stats.bestStreak||0, newStreak),
      xp: newXp,
      bestRank: getRank(Math.max(rankPoints, playMode==="ranked"&&isWin?rankPoints+calcRpChange(p):rankPoints)).id,
      legendaryCount: legCount,
    };
    setStats(newStats);

    // ── Ranked RP
    let rpChange=null;
    if(playMode==="ranked"){
      const base = calcRpChange(p);
      // Streak bonus in ranked
      const streakBonus = newStreak>=10?40:newStreak>=5?20:newStreak>=3?10:0;
      const total = base + streakBonus;
      setRankPoints(rp=>Math.max(0,rp+total));
      setRpChange(total);
      rpChange=total;
    }

    // ── Daily challenge
    let dailyCompleted=false;
    const dp = {...dailyProgress};
    if(!dp[today]?.claimed){
      if(challenge.isPlay){
        const cnt=(dp[today]?.playCount||0)+1;
        dp[today]={...dp[today], playCount:cnt};
        if(cnt>=3){dailyCompleted=true;}
      } else if(challenge.isRankedPlay){
        if(playMode==="ranked"){
          const cnt=(dp[today]?.rankedPlayCount||0)+1;
          dp[today]={...dp[today], rankedPlayCount:cnt};
          if(cnt>=3){dailyCompleted=true;}
        }
      } else if(challenge.check(p, playMode==="ranked")){
        dailyCompleted=true;
      }
      if(dailyCompleted&&!dp[today]?.claimed){
        dp[today]={...dp[today], claimed:true};
        bonusRp+=challenge.rpBonus;
        if(playMode==="ranked") setRankPoints(rp=>Math.max(0,rp+challenge.rpBonus));
        setDailyBonus(challenge.rpBonus);
      } else {
        setDailyBonus(0);
      }
    }
    setDailyProgress(dp);

    // ── Achievements
    const earned=[...achievements];
    ACHIEVEMENTS.forEach(ach=>{
      if(earned.includes(ach.id)) return;
      const newRp = rankPoints + (rpChange||0) + bonusRp;
      if(ach.check(newStats, newRp)){
        earned.push(ach.id);
        newAch.push(ach);
      }
    });
    if(newAch.length) setNewAchievements(newAch);
    setAchievements(earned);

    // ── Trophies (normal mode only)
    let newTrophyRewardsList = [];
    if(playMode!=="ranked"){
      const earned = calcTrophies(p);
      if(earned>0){
        const oldTrophies = trophies;
        const newTrophies = oldTrophies + earned;
        setTrophies(newTrophies);
        // Check for newly unlocked trophy road rewards
        TROPHY_ROAD.forEach(milestone=>{
          if(oldTrophies < milestone.trophies && newTrophies >= milestone.trophies){
            newTrophyRewardsList.push(milestone);
            if(milestone.reward==="skin" && milestone.id){
              const skin = KERNELS.find(k=>k.id===milestone.id);
              if(skin) setUnlockedKernels(prev=>prev.find(k=>k.id===skin.id)?prev:[...prev,skin]);
            }
            if(milestone.glowId){
              setUnlockedGlows(prev=>prev.includes(milestone.glowId)?prev:[...prev,milestone.glowId]);
            }
          }
        });
        if(newTrophyRewardsList.length>0) setNewTrophyRewards(newTrophyRewardsList);
      }
    }

    setPlacement(p);
    setRpChange(rpChange);
    setScreen("chest");
  }
